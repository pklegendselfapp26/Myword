name: Build My Word APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git zip unzip openjdk-17-jdk \
            build-essential libssl-dev libffi-dev \
            libsqlite3-dev python3-dev \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev \
            cmake libltdl-dev patch

      - name: Install buildozer
        run: |
          pip install --upgrade pip
          pip install "cython<3.0.0" buildozer

      - name: Accept Android licenses
        run: |
          mkdir -p $HOME/.android
          touch $HOME/.android/repositories.cfg
          yes | buildozer android debug 2>&1 | head -5 || true

      - name: Build debug APK
        run: |
          export GRADLE_OPTS="-Xmx2048m -Dorg.gradle.daemon=false"
          export JAVA_OPTS="-Xmx2048m"
          buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyWord-debug-apk
          path: bin/*.apk
          retention-days: 30
